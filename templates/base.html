<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Главная{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <a href="{{ url_for('index') }}">Все методички</a>
        </div>
        <div>
            <a href="{{ url_for('add_metod') }}">Добавить методическую разработку</a>
        </div>
        <div>
            {% if current_user %}
                {{ current_user.full_name }}  |
                <a href="{{ url_for('logout') }}">Выйти</a>
            {% else %}
                <a href="{{ url_for('login') }}">Войти</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!--Модалка-->
    <div id="modal" class="modal">
      <div class="modal-content">
        <p id="modal-message"></p>
        <div class="modal-actions">
            <!--
            <a id="yes-a" href=""><button >Да</button></a>
            <a id="no-a" href=""><button id="no-btn">Нет</button></a>
            -->
            <button id="yes-a" type="button">Да</button>
            <button id="no-btn" type="button">Нет</button>
        </div>
      </div>
    </div>
</body>
</html>
